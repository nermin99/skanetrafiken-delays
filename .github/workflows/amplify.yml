name: Amplify Backend

on:
  push:
    branches: [main]
    paths: ['frontend/amplify/**']

permissions:
  id-token: write
  contents: write

jobs:
  CD:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Amplify backend
        run: npx ampx pipeline-deploy --branch main --app-id dlosgtj9m58ln

      - name: Commit updated amplify_outputs.json
        run: |
          if [[ -n $(git status --porcelain amplify_outputs.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add amplify_outputs.json
            git commit -m "Update amplify_outputs.json from backend deploy"
            git push
          fi
